<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" role="img" aria-label="Bazzana Motor Garden">
    <title>Bazzana Motor Garden</title>

    <!-- Scudo esagonale doppio bordo bianco -->
    <path d="M 80 30 L 720 30 L 770 130 L 720 230 L 80 230 L 30 130 Z"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 95 48 L 705 48 L 750 130 L 705 212 L 95 212 L 50 130 Z"
          fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>

    <!-- BAZZANA: testo bianco grassetto extra-bold, leggermente italic -->
    <text x="400" y="125" text-anchor="middle"
          font-family="'Impact', 'Arial Black', 'Bebas Neue', sans-serif"
          font-size="84" font-weight="900" fill="#ffffff"
          letter-spacing="2" font-style="italic"
          dominant-baseline="middle">BAZZANA</text>

    <!-- Linea separatrice rosso/verde sotto BAZZANA -->
    <line x1="155" y1="158" x2="395" y2="158" stroke="#CE2B37" stroke-width="5" stroke-linecap="round"/>
    <line x1="405" y1="158" x2="645" y2="158" stroke="#009246" stroke-width="5" stroke-linecap="round"/>

    <!-- MOTOR (rosso) + GARDEN (verde) -->
    <text x="400" y="190" text-anchor="middle"
          font-family="'Impact', 'Arial Black', 'Bebas Neue', sans-serif"
          font-size="32" font-weight="900" letter-spacing="4"
          dominant-baseline="middle">
        <tspan fill="#CE2B37">MOTOR</tspan><tspan dx="22" fill="#009246">GARDEN</tspan>
    </text>
</svg>
