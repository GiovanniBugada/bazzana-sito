<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="ph-title">
  <title id="ph-title">Foto in arrivo</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e8e3d4"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.3" fill="rgba(14, 15, 14, 0.04)"/>
      <circle cx="3" cy="3" r="0.3" fill="rgba(14, 15, 14, 0.03)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grain)"/>

  <!-- Inner frame -->
  <rect x="80" y="80" width="440" height="440" fill="none" stroke="rgba(14, 15, 14, 0.10)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Camera icon -->
  <g transform="translate(300 250)" fill="none" stroke="#0E0F0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <rect x="-58" y="-30" width="116" height="76" rx="6"/>
    <path d="M -36 -30 L -28 -42 L 28 -42 L 36 -30"/>
    <circle cx="0" cy="10" r="22"/>
    <circle cx="0" cy="10" r="12" opacity="0.5"/>
    <circle cx="40" cy="-14" r="2.5" fill="#ee5e1f" stroke="none" opacity="1"/>
  </g>

  <!-- Eyebrow label -->
  <text x="300" y="365" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="11" letter-spacing="2.8"
        fill="#0E0F0E" opacity="0.55"
        font-weight="500">
    MOTOR GARDEN BAZZANA
  </text>

  <!-- Main title -->
  <text x="300" y="410" text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="34" font-weight="400"
        fill="#0E0F0E">
    Foto in arrivo
  </text>

  <!-- Sub-line italic -->
  <text x="300" y="448" text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="18" font-weight="300" font-style="italic"
        fill="#0E0F0E" opacity="0.7">
    descrizione e specifiche qui sotto
  </text>

  <!-- Brand dot -->
  <circle cx="300" cy="495" r="3.5" fill="#ee5e1f"/>
</svg>
