<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="ph-title">
  <title id="ph-title">Foto in arrivo — Rasaerba a batteria</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e8e3d4"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.3" fill="rgba(14, 15, 14, 0.04)"/>
      <circle cx="3" cy="3" r="0.3" fill="rgba(14, 15, 14, 0.03)"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grain)"/>
  <rect x="80" y="80" width="440" height="440" fill="none" stroke="rgba(14, 15, 14, 0.10)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Rasaerba batteria: corpo + batteria stilizzata + lampo -->
  <g transform="translate(300 275)" fill="none" stroke="#0E0F0E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
    <!-- Corpo -->
    <rect x="-70" y="0" width="140" height="42" rx="4"/>
    <!-- Slot batteria sopra il corpo -->
    <rect x="-22" y="-26" width="44" height="22" rx="2" fill="#2D8B3E" fill-opacity="0.18" stroke="#2D8B3E"/>
    <rect x="-2" y="-32" width="8" height="6" rx="1" stroke="#2D8B3E"/>
    <!-- Ruote -->
    <circle cx="-50" cy="50" r="14"/>
    <circle cx="50" cy="50" r="14"/>
    <!-- Manubrio -->
    <path d="M -30 0 L -60 -70"/>
    <path d="M 30 0 L 60 -70"/>
    <path d="M -65 -75 L 65 -75"/>
  </g>

  <!-- Simbolo lampo batteria -->
  <g transform="translate(395 235)" fill="#2D8B3E" stroke="none" opacity="0.85">
    <path d="M 0 -18 L -8 4 L -2 4 L -4 18 L 8 -4 L 2 -4 Z"/>
  </g>

  <text x="300" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="2.8" fill="#0E0F0E" opacity="0.55" font-weight="500">WEIBANG · RASAERBA A BATTERIA</text>
  <text x="300" y="415" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="400" fill="#0E0F0E">Foto in arrivo</text>
  <text x="300" y="452" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="300" font-style="italic" fill="#0E0F0E" opacity="0.7">silenzioso, zero emissioni — foto qui sotto</text>

  <circle cx="300" cy="495" r="3.5" fill="#2D8B3E"/>
</svg>
