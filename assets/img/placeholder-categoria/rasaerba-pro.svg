<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="ph-title">
  <title id="ph-title">Foto in arrivo — Rasaerba professionale</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e8e3d4"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.3" fill="rgba(14, 15, 14, 0.04)"/>
      <circle cx="3" cy="3" r="0.3" fill="rgba(14, 15, 14, 0.03)"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grain)"/>
  <rect x="80" y="80" width="440" height="440" fill="none" stroke="rgba(14, 15, 14, 0.10)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Rasaerba pro: corpo robusto + cesto + manubrio + badge PRO -->
  <g transform="translate(300 270)" fill="none" stroke="#0E0F0E" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Cesto rinforzato -->
    <path d="M 70 -10 L 115 -30 L 115 35 L 70 22 Z"/>
    <path d="M 90 -22 L 90 28" stroke-width="1.5" opacity="0.5"/>
    <!-- Corpo robusto -->
    <rect x="-78" y="-2" width="148" height="48" rx="5"/>
    <!-- Doppia striscia rinforzo -->
    <line x1="-78" y1="14" x2="70" y2="14" stroke-width="1.5" opacity="0.5"/>
    <!-- Ruote larghe -->
    <circle cx="-52" cy="52" r="20"/>
    <circle cx="52" cy="52" r="20"/>
    <circle cx="-52" cy="52" r="8" opacity="0.5"/>
    <circle cx="52" cy="52" r="8" opacity="0.5"/>
    <!-- Manubrio -->
    <path d="M -32 -2 L -62 -72"/>
    <path d="M 32 -2 L 62 -72"/>
    <path d="M -67 -77 L 67 -77"/>
    <!-- Leve trazione -->
    <path d="M -55 -77 L -55 -85" stroke-width="1.5"/>
    <path d="M 55 -77 L 55 -85" stroke-width="1.5"/>
  </g>

  <!-- Badge PRO -->
  <g transform="translate(395 230)">
    <circle r="20" fill="#2D8B3E" opacity="0.95"/>
    <text x="0" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#f4f1ea" letter-spacing="1">PRO</text>
  </g>

  <text x="300" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="2.8" fill="#0E0F0E" opacity="0.55" font-weight="500">WEIBANG · RASAERBA PROFESSIONALE</text>
  <text x="300" y="415" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="400" fill="#0E0F0E">Foto in arrivo</text>
  <text x="300" y="452" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="300" font-style="italic" fill="#0E0F0E" opacity="0.7">specifiche e foto del modello qui sotto</text>

  <circle cx="300" cy="495" r="3.5" fill="#2D8B3E"/>
</svg>
