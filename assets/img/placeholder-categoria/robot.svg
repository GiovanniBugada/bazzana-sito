<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="ph-title">
  <title id="ph-title">Foto in arrivo — Robot tagliaerba</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e8e3d4"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.3" fill="rgba(14, 15, 14, 0.04)"/>
      <circle cx="3" cy="3" r="0.3" fill="rgba(14, 15, 14, 0.03)"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grain)"/>
  <rect x="80" y="80" width="440" height="440" fill="none" stroke="rgba(14, 15, 14, 0.10)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Robot tondo dall'alto: cerchio + sensori + onde wifi -->
  <g transform="translate(300 275)" fill="none" stroke="#0E0F0E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Corpo principale ellittico -->
    <ellipse cx="0" cy="10" rx="85" ry="55"/>
    <ellipse cx="0" cy="10" rx="60" ry="36" opacity="0.4"/>
    <!-- Display centrale -->
    <rect x="-22" y="-8" width="44" height="20" rx="3" opacity="0.6"/>
    <!-- Sensori (4 puntini) -->
    <circle cx="-65" cy="-8" r="3" fill="#0E0F0E" stroke="none"/>
    <circle cx="65" cy="-8" r="3" fill="#0E0F0E" stroke="none"/>
    <circle cx="0" cy="-40" r="3" fill="#0E0F0E" stroke="none"/>
    <circle cx="0" cy="58" r="3" fill="#0E0F0E" stroke="none"/>
    <!-- Lama (cerchio sotto centrale) -->
    <circle cx="0" cy="10" r="14" stroke-width="1.5" opacity="0.45" stroke-dasharray="3 3"/>
  </g>

  <!-- Onde wifi sopra il robot (verde Weibang) -->
  <g transform="translate(300 175)" fill="none" stroke="#2D8B3E" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <path d="M -22 0 A 24 24 0 0 1 22 0"/>
    <path d="M -12 6 A 14 14 0 0 1 12 6"/>
    <circle cx="0" cy="12" r="2.5" fill="#2D8B3E" stroke="none"/>
  </g>

  <text x="300" y="380" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="2.8" fill="#0E0F0E" opacity="0.55" font-weight="500">WEIBANG · ROBOT TAGLIAERBA</text>
  <text x="300" y="425" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="400" fill="#0E0F0E">Foto in arrivo</text>
  <text x="300" y="462" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="300" font-style="italic" fill="#0E0F0E" opacity="0.7">il prato si fa da solo — foto qui sotto</text>

  <circle cx="300" cy="500" r="3.5" fill="#2D8B3E"/>
</svg>
